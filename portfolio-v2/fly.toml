# fly.toml app configuration file generated for portfolio-v2-late-willow-9638 on 2026-07-03T22:12:37-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'portfolio-v2-late-willow-9638'
primary_region = 'iad'

[build]
  image = 'ghcr.io/tursodatabase/libsql-server:latest'

[mounts]
  source = "libsql_data"
  destination = "/var/lib/sqld"

[env]
  SQLD_NODE = "primary"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
